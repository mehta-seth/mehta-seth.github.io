<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Favicon for aditmehta.com (April 2026 redesign).

    Composition: a white rounded-square background with the Devanagari
    letter "अ" (the first letter of "अदित", and of the Sanskrit/Hindi
    alphabet) centered on top in the warm-amber accent color.

    Why this shape: the previous version was a transparent SVG with the
    glyph alone, relying on the browser tab's chrome for contrast. That
    rendered inconsistently — invisible against light tabs in some
    themes, washed out in others. A solid white rounded card gives the
    glyph a stable surface in every browser/OS chrome combination,
    matching the favicon convention used by most contemporary editorial
    sites (e.g., darioamodei.com).

    Why white (not theme-aware): browser favicons live outside the page
    and don't receive the page's theme. A neutral light background
    works for both dark and light browser chromes. The amber glyph
    reads against white at all sizes from 16px up.

    Why "अ" rendered as text (not path): keeps the SVG tiny (~700 bytes)
    and inherits the OS Devanagari font, which means it always looks
    correct regardless of font availability. This is acceptable because
    SVG favicon support is built around text + basic shapes; for one
    glyph, font-fallback is more robust than a rasterizable path.

    Font-family note: "Noto Sans Devanagari" is listed first because
    it's the de-facto open-source Devanagari font shipped with
    Linux/Android/most server-side renderers. macOS/iOS ignore that
    name and fall through to their system Devanagari (Devanagari MT,
    Kohinoor Devanagari). The site's primary face Kalam is NOT used
    here — browsers don't apply page CSS to favicons, so the @font-face
    rules don't reach this file. Listing system-ui/sans-serif as the
    final fallback covers any environment without a Devanagari font
    installed (the glyph then renders as tofu, but that's a degenerate
    OS configuration we don't optimize for).

    Color choice: the warm-amber accent in dark theme (#d4a574). It
    has higher contrast against white than the light-theme accent
    (#8a5a2b would also work but reads slightly muddy at 16px).

    Background corner radius: 12px on a 64px viewBox = ~19% — matches
    the iOS/macOS app icon convention and the rounded-corner aesthetic
    of contemporary site favicons.
  -->
  <rect
    x="0"
    y="0"
    width="64"
    height="64"
    rx="12"
    ry="12"
    fill="#faf8f3"
  />
  <text
    x="32"
    y="50"
    text-anchor="middle"
    font-family="'Noto Sans Devanagari', 'Kalam', system-ui, sans-serif"
    font-size="56"
    font-weight="400"
    fill="#d4a574"
  >अ</text>
</svg>
